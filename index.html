<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Bots · TV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cyan:  #00f5ff;
    --blue:  #0055ff;
    --green: #00ff88;
    --bg:    #060610;
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── GRID ──────────────────────────────── */
  .grid-bg {
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,245,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.035) 1px, transparent 1px);
    background-size: 70px 70px;
  }

  /* ── RADIAL GLOWS ──────────────────────── */
  .glow {
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 55% 70% at 38% 50%, rgba(0,85,255,.13) 0%, transparent 65%),
      radial-gradient(ellipse 35% 50% at 82% 50%, rgba(0,245,255,.08) 0%, transparent 55%);
    animation: glow-breathe 5s ease-in-out infinite alternate;
  }
  @keyframes glow-breathe { from{opacity:.7} to{opacity:1} }

  /* ── SCANLINES ─────────────────────────── */
  .scanlines {
    position:fixed; inset:0; z-index:999; pointer-events:none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,245,255,.014) 3px, rgba(0,245,255,.014) 4px
    );
  }

  /* ── MOVING SCANBAR ────────────────────── */
  .scanbar {
    position:fixed; left:0; right:0; height:4px;
    background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, transparent 100%);
    opacity:.15; z-index:998; pointer-events:none;
    animation: scanbar 6s linear infinite;
  }
  @keyframes scanbar { from{top:-4px} to{top:100vh} }

  /* ── CORNER BRACKETS ───────────────────── */
  .corner { position:fixed; z-index:10; pointer-events:none; }
  .c-tl { top:28px;    left:28px;  }
  .c-tr { top:28px;    right:28px; }
  .c-bl { bottom:50px; left:28px;  }
  .c-br { bottom:50px; right:28px; }

  /* ── PARTICLES ─────────────────────────── */
  .particles { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .p {
    position:absolute; border-radius:50%;
    animation: pfloat var(--d) linear var(--delay) infinite both;
    opacity:0;
  }
  @keyframes pfloat {
    0%   { transform:translateY(110vh) translateX(0);   opacity:0; }
    8%   { opacity:.7; }
    92%  { opacity:.4; }
    100% { transform:translateY(-40px) translateX(var(--dx)); opacity:0; }
  }

  /* ── MAIN LAYOUT ───────────────────────── */
  .stage {
    position:relative; z-index:10;
    width:100vw; height:calc(100vh - 42px);
    display:grid;
    grid-template-columns: 1fr 320px;
    align-items:center;
    padding: 60px 80px 60px 100px;
    gap: 60px;
  }

  /* ── LEFT ──────────────────────────────── */
  .left {
    display:flex; flex-direction:column; gap:30px;
    animation: slidein .9s ease both;
  }
  @keyframes slidein {
    from { opacity:0; transform:translateX(-40px); }
    to   { opacity:1; transform:translateX(0); }
  }

  .top-label {
    font-size:14px; letter-spacing:10px;
    color:var(--cyan); opacity:.45;
    text-transform:uppercase;
  }

  .logo {
    display:flex; align-items:baseline; gap:24px;
  }
  .logo-team {
    font-family:'Orbitron', monospace;
    font-size: clamp(70px, 9vw, 108px);
    font-weight:900; color:#fff; line-height:1;
    text-shadow: 0 0 40px rgba(255,255,255,.12);
    animation: glitch 7s ease-in-out infinite;
  }
  .logo-bots {
    font-family:'Orbitron', monospace;
    font-size: clamp(70px, 9vw, 108px);
    font-weight:900; color:var(--cyan); line-height:1;
    text-shadow: 0 0 30px var(--cyan), 0 0 80px rgba(0,245,255,.5);
    animation: pulse-glow 2.8s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { text-shadow: 0 0 25px var(--cyan), 0 0 60px rgba(0,245,255,.35); }
    50%      { text-shadow: 0 0 55px var(--cyan), 0 0 130px rgba(0,245,255,.65), 0 0 200px rgba(0,85,255,.25); }
  }
  @keyframes glitch {
    0%,92%,100% { clip-path:none; transform:none; }
    93% { clip-path:inset(15% 0 65% 0); transform:translate(-5px,0); }
    94% { clip-path:inset(65% 0 8% 0);  transform:translate(5px,0); }
    95% { clip-path:none; transform:none; }
  }

  .line-divider {
    position:relative; height:2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    overflow:visible;
  }
  .line-divider::after {
    content:'';
    position:absolute; left:0; top:-1px;
    width:80px; height:4px;
    background:var(--cyan);
    box-shadow: 0 0 14px var(--cyan);
    animation: lineslide 3.5s ease-in-out infinite;
  }
  @keyframes lineslide {
    0%   { left:0;              width:80px; }
    50%  { left:calc(55% - 80px); width:130px; }
    100% { left:0;              width:80px; }
  }

  .subtitle {
    font-family:'Rajdhani', sans-serif;
    font-size: clamp(16px, 2vw, 22px);
    letter-spacing:5px; color:#fff; opacity:.4;
    text-transform:uppercase;
  }

  /* ── CHIPS ─────────────────────────────── */
  .chips { display:flex; gap:14px; flex-wrap:wrap; }
  .chip {
    font-family:'Orbitron', monospace;
    font-size:13px; font-weight:700; letter-spacing:4px;
    padding:10px 22px; border:1.5px solid;
    text-transform:uppercase; position:relative;
    transition: all .3s;
  }
  .chip::before {
    content:''; position:absolute; inset:0;
    background:currentColor; opacity:0; transition:opacity .3s;
  }
  .chip.active::before { opacity:.15; }

  .chip-ia   { color:#2277ff; border-color:#2277ff44; }
  .chip-rob  { color:#ff6a00; border-color:#ff6a0044; }
  .chip-agro { color:#00cc55; border-color:#00cc5544; }
  .chip-aero { color:#aa44ff; border-color:#aa44ff44; }
  .chip-ev   { color:#00cccc; border-color:#00cccc44; }

  .status-row {
    display:flex; align-items:center; gap:18px;
  }
  .dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--green); box-shadow:0 0 14px var(--green);
    animation: blink 1.1s step-end infinite; flex-shrink:0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .status-text { font-size:15px; letter-spacing:5px; color:var(--green); text-transform:uppercase; }
  .sep { width:1px; height:22px; background:#fff2; flex-shrink:0; }
  .status-desc { font-size:14px; color:#fff; opacity:.32; letter-spacing:1px; }

  /* ── RIGHT — QR ────────────────────────── */
  .right {
    display:flex; flex-direction:column;
    align-items:center; gap:24px;
    animation: fadein 1s ease .5s both;
  }

  .qr-frame {
    width:260px; height:260px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }

  .qb {
    position:absolute; width:34px; height:34px;
    border-color:var(--cyan); border-style:solid; opacity:.9;
  }
  .qb.tl { top:0;    left:0;  border-width:3px 0 0 3px; }
  .qb.tr { top:0;    right:0; border-width:3px 3px 0 0; }
  .qb.br { bottom:0; right:0; border-width:0 3px 3px 0; }
  .qb.bl { bottom:0; left:0;  border-width:0 0 3px 3px; }

  .qr-scan {
    position:absolute; left:10px; right:10px; height:3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 14px var(--cyan), 0 0 35px rgba(0,245,255,.3);
    animation: qrscan 2.2s ease-in-out infinite;
    opacity:.85; z-index:2;
  }
  @keyframes qrscan {
    0%   { top:10px; opacity:.8; }
    50%  { top:calc(100% - 14px); opacity:1; }
    100% { top:10px; opacity:.8; }
  }

  .qr-inner {
    width:228px; height:228px;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  #qrcode, #qrcode canvas, #qrcode img {
    display:block !important;
    width:228px !important; height:228px !important;
  }

  .qr-ring {
    position:absolute; inset:-18px;
    border:1px solid rgba(0,245,255,.14);
    border-radius:2px;
    animation: ring-pulse 3s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes ring-pulse {
    0%,100% { opacity:.3; transform:scale(1); }
    50%      { opacity:.8; transform:scale(1.04); }
  }

  .qr-caption {
    text-align:center;
    font-size:12px; letter-spacing:5px;
    color:var(--cyan); opacity:.5;
    text-transform:uppercase; line-height:2.2;
  }
  .qr-caption strong {
    display:block; font-family:'Rajdhani',sans-serif;
    font-size:18px; font-weight:700; letter-spacing:3px;
    color:#fff; opacity:.85;
  }

  /* ── HUD rings ─────────────────────────── */
  .hud-ring {
    position:fixed; border-radius:50%;
    border:1px solid rgba(0,245,255,.05);
    pointer-events:none; z-index:2;
    animation: hud 8s ease-in-out infinite;
  }
  @keyframes hud {
    0%,100% { opacity:.4; transform:scale(.97); }
    50%      { opacity:.9; transform:scale(1.03); }
  }

  @keyframes fadein { from{opacity:0} to{opacity:1} }

  /* ── TICKER ─────────────────────────────── */
  .ticker-wrap {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    height:42px; border-top:1px solid rgba(0,245,255,.1);
    background:rgba(0,0,0,.55);
    overflow:hidden; display:flex; align-items:center;
  }
  .ticker-label {
    flex-shrink:0; background:var(--cyan);
    color:#000; font-size:11px; letter-spacing:4px;
    font-weight:700; text-transform:uppercase;
    padding:0 22px; height:100%;
    display:flex; align-items:center;
    white-space:nowrap;
  }
  .ticker-track {
    display:flex; align-items:center; height:100%;
    animation: ticker 24s linear infinite;
    white-space:nowrap;
  }
  .ticker-item {
    font-size:12px; letter-spacing:4px;
    color:rgba(255,255,255,.45); padding:0 50px;
    text-transform:uppercase;
  }
  .ticker-dot {
    width:4px; height:4px; border-radius:50%;
    background:var(--cyan); opacity:.4; flex-shrink:0;
  }
  @keyframes ticker {
    from { transform:translateX(0); }
    to   { transform:translateX(-50%); }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>
<div class="scanlines"></div>
<div class="scanbar"></div>

<!-- HUD -->
<div class="hud-ring" style="width:700px;height:700px;left:calc(38% - 350px);top:calc(50% - 371px);animation-delay:0s"></div>
<div class="hud-ring" style="width:460px;height:460px;left:calc(38% - 230px);top:calc(50% - 251px);animation-delay:3s"></div>

<!-- Corners -->
<svg class="corner c-tl" width="70" height="70" viewBox="0 0 70 70">
  <polyline points="0,50 0,0 50,0" fill="none" stroke="rgba(0,245,255,.3)" stroke-width="2"/>
  <circle cx="0" cy="0" r="4" fill="rgba(0,245,255,.5)"/>
</svg>
<svg class="corner c-tr" width="70" height="70" viewBox="0 0 70 70">
  <polyline points="70,50 70,0 20,0" fill="none" stroke="rgba(0,245,255,.3)" stroke-width="2"/>
  <circle cx="70" cy="0" r="4" fill="rgba(0,245,255,.5)"/>
</svg>
<svg class="corner c-bl" width="70" height="70" viewBox="0 0 70 70">
  <polyline points="0,20 0,70 50,70" fill="none" stroke="rgba(0,245,255,.3)" stroke-width="2"/>
  <circle cx="0" cy="70" r="4" fill="rgba(0,245,255,.5)"/>
</svg>
<svg class="corner c-br" width="70" height="70" viewBox="0 0 70 70">
  <polyline points="70,20 70,70 20,70" fill="none" stroke="rgba(0,245,255,.3)" stroke-width="2"/>
  <circle cx="70" cy="70" r="4" fill="rgba(0,245,255,.5)"/>
</svg>

<!-- Particles -->
<div class="particles" id="pts"></div>

<!-- STAGE -->
<div class="stage">

  <!-- LEFT -->
  <div class="left">
    <div class="top-label">Faculdade · Grupo de Tecnologia da Informação</div>

    <div class="logo">
      <span class="logo-team">TEAM</span>
      <span class="logo-bots">BOTS</span>
    </div>

    <div class="line-divider"></div>
    <div class="subtitle">Área de T.I. · 5 Equipes · Projetos Reais</div>

    <div class="chips">
      <div class="chip chip-ia"   id="c0">IA</div>
      <div class="chip chip-rob"  id="c1">Robótica</div>
      <div class="chip chip-agro" id="c2">Agro</div>
      <div class="chip chip-aero" id="c3">Aeroespacial</div>
      <div class="chip chip-ev"   id="c4">Carro Elétrico</div>
    </div>

    <div class="status-row">
      <div class="dot"></div>
      <span class="status-text">Recrutando agora</span>
      <div class="sep"></div>
      <span class="status-desc">Escaneie o QR Code ao lado e faça parte</span>
    </div>
  </div>

  <!-- RIGHT — QR -->
  <div class="right">
    <div class="qr-frame">
      <div class="qb tl"></div>
      <div class="qb tr"></div>
      <div class="qb br"></div>
      <div class="qb bl"></div>
      <div class="qr-scan"></div>
      <div class="qr-inner">
        <div id="qrcode"></div>
      </div>
      <div class="qr-ring"></div>
    </div>
    <div class="qr-caption">
      <strong>Aponte a câmera</strong>
      e descubra as equipes
    </div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">Team Bots</div>
  <div class="ticker-track" id="ticker"></div>
</div>

<script>
// QR Code
new QRCode(document.getElementById("qrcode"), {
  text: "https://dvx0exe.github.io/divulgaTeamBots/cada_grupo.html",
  width: 228, height: 228,
  colorDark: "#000000", colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});

// Particles
const pts = document.getElementById('pts');
const colors = ['#00f5ff','#0055ff','#00ff88','#aa44ff','#ffffff'];
for (let i = 0; i < 45; i++) {
  const el = document.createElement('div');
  el.className = 'p';
  const s = Math.random()*3+1;
  el.style.cssText = `
    left:${Math.random()*100}%;
    width:${s}px; height:${s}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    --d:${7+Math.random()*14}s;
    --delay:-${Math.random()*14}s;
    --dx:${(Math.random()-.5)*100}px;
  `;
  pts.appendChild(el);
}

// Chips cycle
const chips = [0,1,2,3,4].map(i => document.getElementById('c'+i));
let ci = 0;
setInterval(() => {
  chips.forEach(c => c.classList.remove('active'));
  chips[ci].classList.add('active');
  ci = (ci+1) % chips.length;
}, 1800);

// Ticker
const items = [
  'Inteligência Artificial','Robótica','Agrotecnologia',
  'Aeroespacial','Carro Elétrico','Faça parte do grupo',
  'Escaneie o QR Code','Projetos Reais','Tecnologia da Informação'
];
const track = document.getElementById('ticker');
[...items,...items].forEach(txt => {
  const s = document.createElement('span');
  s.className = 'ticker-item'; s.textContent = txt;
  track.appendChild(s);
  const d = document.createElement('div');
  d.className = 'ticker-dot';
  track.appendChild(d);
});
</script>
</body>
</html>
